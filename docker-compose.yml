services:
  db:
    image: postgres:16-alpine
    container_name: reward_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: reward
      POSTGRES_PASSWORD: reward
      POSTGRES_DB: reward_dev
    ports:
      - "5433:5432"
    volumes:
      - reward_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reward -d reward_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: reward_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - reward_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  reward_pgdata:
  reward_redisdata:
